version: '3.9'

services:
  backend:
    build: ./backend
    container_name: pos_backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    ports:
      - '3000:3000'
    networks:
      - pos_network

  postgres:
    image: postgres:15
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos
      POSTGRES_DB: posdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pos_network
    expose:
      - '5432'

  redis:
    image: redis:7-alpine
    container_name: pos_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pos_network
    expose:
      - '6379'

  nginx:
    image: nginx:alpine
    container_name: pos_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - pos_network

volumes:
  postgres_data:
  redis_data:

networks:
  pos_network:
